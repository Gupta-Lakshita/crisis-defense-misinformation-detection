name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scikit-learn pandas numpy shap matplotlib seaborn pytest

    - name: Run tests
      run: pytest tests/ -v --tb=short

    - name: Verify dataset loads
      run: |
        python -c "
        import pandas as pd
        df = pd.read_csv('data/crisis_defense_benchmark_v2.csv')
        assert len(df) > 2000, 'Dataset too small'
        assert set(df['label'].unique()) == {0, 1}, 'Labels invalid'
        assert 'source' in df.columns, 'Missing source column'
        print(f'Dataset OK: {len(df)} samples, sources: {df[\"source\"].unique().tolist()}')
        "
