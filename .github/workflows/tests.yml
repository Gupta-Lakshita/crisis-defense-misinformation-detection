name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scikit-learn pandas numpy shap matplotlib seaborn pytest openpyxl

    - name: Run tests
      run: pytest tests/ -v --tb=short

    - name: Verify benchmark dataset
      run: |
        python -c "
        import pandas as pd
        df = pd.read_csv('data/crisis_defense_benchmark_v4.csv')
        assert len(df) > 8000, f'Expected >8000 samples, got {len(df)}'
        assert set(df.label.unique()) == {0,1}, 'Labels must be binary'
        for col in ['text','label','source','crisis_type']:
            assert col in df.columns, f'Missing column: {col}'
        print(f'Benchmark v4 OK: {len(df)} samples | sources: {df.source.nunique()} | types: {df.crisis_type.nunique()}')
        df2 = pd.read_csv('data/crisis_defense_benchmark_v2.csv')
        assert len(df2) > 2000
        print(f'Benchmark v2 OK: {len(df2)} samples')
        "
